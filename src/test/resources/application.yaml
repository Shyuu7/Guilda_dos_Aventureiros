spring:
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
      show-sql: true

  flyway:
    enabled: true
    clean-disabled: false
    locations: classpath:db/migration-h2
    clean-on-validation-error: true

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;INIT=CREATE SCHEMA IF NOT EXISTS audit\;CREATE SCHEMA IF NOT EXISTS aventura
    username: sa
    password:
    driverClassName: org.h2.Driver