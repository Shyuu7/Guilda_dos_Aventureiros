spring:
  application:
    name: guilda_dos_aventireiros_api
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postpass
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    schemas: aventura
    locations: classpath:db/migration
  cache:
    type: redis
    cache-names: topMissoes
    redis:
      time-to-live: 24h
  data:
    redis:
      host: localhost
      port: 6379
  elasticsearch:
    uris: http://localhost:9200